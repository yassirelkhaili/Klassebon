# Local PostgreSQL + Mailpit (mock SMTP) for development
# Usage: docker compose up -d
# Postgres → DATABASE_URL in packages/backend/.env
# Mailpit  → Web UI http://localhost:8025 | SMTP localhost:1025 (set SMTP_HOST / SMTP_PORT in backend .env)

services:
  postgres:
    image: postgres:16-alpine
    container_name: klassebon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: klassebon
      POSTGRES_PASSWORD: klassebon
      POSTGRES_DB: klassebon
    ports:
      - "5432:5432"
    volumes:
      - klassebon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klassebon -d klassebon"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: klassebon-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  klassebon_pgdata:
